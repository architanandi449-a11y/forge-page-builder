<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGE — Page Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --neon: #E6FF00;
    --neon-dim: rgba(230,255,0,0.12);
    --neon-glow: 0 0 20px rgba(230,255,0,0.4), 0 0 40px rgba(230,255,0,0.15);
    --neon-glow-sm: 0 0 10px rgba(230,255,0,0.3);
    --bg: #080808;
    --bg2: #0f0f0f;
    --bg3: #161616;
    --bg4: #1e1e1e;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(230,255,0,0.3);
    --text: #f0f0f0;
    --text-dim: rgba(240,240,240,0.45);
    --text-muted: rgba(240,240,240,0.25);
    --radius: 14px;
    --radius-sm: 8px;
    --sidebar-w: 260px;
    --font: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }
  #root { height: 100%; display: flex; flex-direction: column; }
  * { cursor: none !important; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(230,255,0,0.2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(230,255,0,0.4); }

  /* Custom cursor */
  #cursor-ring {
    position: fixed; width: 36px; height: 36px;
    border: 1.5px solid var(--neon); border-radius: 50%;
    pointer-events: none; z-index: 99999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, border-color 0.2s, box-shadow 0.2s;
    mix-blend-mode: screen;
  }
  #cursor-dot {
    position: fixed; width: 5px; height: 5px;
    background: var(--neon); border-radius: 50%;
    pointer-events: none; z-index: 99999;
    transform: translate(-50%, -50%);
    box-shadow: var(--neon-glow-sm);
    transition: opacity 0.2s;
  }
  #cursor-ring.hovering {
    width: 52px; height: 52px;
    box-shadow: var(--neon-glow);
    border-color: var(--neon);
  }
  #cursor-ring.clicking { width: 24px; height: 24px; }

  /* Layout */
  .topbar {
    height: 54px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 20px; gap: 16px; flex-shrink: 0;
    position: relative; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 28px; height: 28px; background: var(--neon);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--neon-glow-sm);
  }
  .logo-mark svg { width: 16px; height: 16px; }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); }
  .logo-text span { color: var(--neon); }
  .topbar-sep { flex: 1; }
  .topbar-badge {
    font-size: 11px; font-family: var(--mono); color: var(--neon);
    background: var(--neon-dim); border: 1px solid rgba(230,255,0,0.2);
    border-radius: 4px; padding: 3px 8px; letter-spacing: 0.05em;
  }
  .undo-redo { display: flex; gap: 4px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); transition: all var(--transition);
    font-size: 15px;
  }
  .icon-btn:hover { border-color: var(--border-hover); color: var(--neon); background: var(--neon-dim); }
  .icon-btn:disabled { opacity: 0.3; }
  .btn-primary {
    height: 32px; padding: 0 14px; border-radius: var(--radius-sm);
    background: var(--neon); border: none; color: #000;
    font-family: var(--font); font-size: 12px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: all var(--transition); display: flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { box-shadow: var(--neon-glow); transform: scale(1.03); }
  .btn-primary:active { transform: scale(0.97); }

  .workspace {
    flex: 1; display: flex; overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w); background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
  }
  .sidebar-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
  }
  .sidebar-search {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 10px;
    font-family: var(--font); font-size: 12px; color: var(--text);
    outline: none; transition: border-color var(--transition);
  }
  .sidebar-search:focus { border-color: rgba(230,255,0,0.3); }
  .sidebar-search::placeholder { color: var(--text-muted); }
  .sidebar-blocks { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
  .block-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    transition: all var(--transition); position: relative;
    overflow: hidden; user-select: none;
  }
  .block-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--neon-dim) 0%, transparent 60%);
    opacity: 0; transition: opacity var(--transition);
  }
  .block-card:hover { border-color: rgba(230,255,0,0.25); transform: translateX(3px); }
  .block-card:hover::before { opacity: 1; }
  .block-card.dragging-source { opacity: 0.4; border-style: dashed; }
  .block-icon {
    width: 32px; height: 32px; border-radius: 7px;
    background: var(--bg4); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .block-info { flex: 1; min-width: 0; }
  .block-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .block-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .drag-handle {
    color: var(--text-muted); font-size: 12px; opacity: 0; transition: opacity 0.15s;
    display: flex; align-items: center;
  }
  .block-card:hover .drag-handle { opacity: 1; }

  /* Canvas */
  .canvas-area {
    flex: 1; overflow-y: auto; padding: 32px;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .canvas-drop-zone {
    width: 100%; max-width: 780px; min-height: 100%;
    display: flex; flex-direction: column; gap: 8px;
    position: relative;
  }
  .canvas-drop-zone.drag-over .drop-indicator { opacity: 1; }

  /* Empty state */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 60px 20px; min-height: 400px;
    border: 2px dashed rgba(230,255,0,0.12); border-radius: var(--radius);
    transition: all var(--transition);
  }
  .empty-state.drag-over {
    border-color: rgba(230,255,0,0.5);
    background: rgba(230,255,0,0.03);
    box-shadow: inset 0 0 40px rgba(230,255,0,0.04);
  }
  .empty-icon {
    width: 72px; height: 72px; border-radius: 18px;
    background: var(--neon-dim); border: 1px solid rgba(230,255,0,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(230,255,0,0.08);
  }
  .empty-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 13px; color: var(--text-dim); line-height: 1.6; max-width: 280px; }
  .empty-hint {
    margin-top: 20px; font-size: 11px; font-family: var(--mono);
    color: var(--neon); opacity: 0.6; letter-spacing: 0.08em;
  }

  /* Canvas blocks */
  .canvas-block-wrap {
    position: relative; width: 100%;
    animation: blockIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes blockIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.97); }
    to { opacity: 1; transform: none; }
  }
  .canvas-block-wrap.removing {
    animation: blockOut 0.18s ease-in forwards;
  }
  @keyframes blockOut {
    to { opacity: 0; transform: scale(0.95) translateY(-8px); max-height: 0; }
  }
  .canvas-block {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    transition: border-color var(--transition), box-shadow var(--transition);
    position: relative; width: 100%;
  }
  .canvas-block:hover { border-color: rgba(255,255,255,0.12); }
  .canvas-block.block-selected {
    border-color: rgba(230,255,0,0.4);
    box-shadow: 0 0 0 1px rgba(230,255,0,0.15), var(--neon-glow);
  }
  .canvas-block.drag-over-block {
    border-color: var(--neon); box-shadow: 0 0 20px rgba(230,255,0,0.2);
  }

  /* Block toolbar */
  .block-toolbar {
    position: absolute; top: -38px; right: 0;
    display: flex; gap: 4px; z-index: 20;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
  }
  .canvas-block-wrap:hover .block-toolbar { opacity: 1; transform: none; pointer-events: all; }
  .tb-btn {
    height: 28px; padding: 0 8px; border-radius: 6px;
    background: var(--bg4); border: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; gap: 4px;
    transition: all 0.15s; white-space: nowrap;
  }
  .tb-btn:hover { background: var(--bg3); color: var(--neon); border-color: rgba(230,255,0,0.3); }
  .tb-btn.danger:hover { color: #ff5555; border-color: rgba(255,85,85,0.3); }
  .tb-drag-handle {
    height: 28px; width: 28px; border-radius: 6px;
    background: var(--bg4); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 12px;
  }

  /* Drop indicator line */
  .drop-line {
    height: 3px; border-radius: 2px; background: var(--neon);
    box-shadow: 0 0 10px var(--neon), 0 0 20px rgba(230,255,0,0.4);
    margin: 2px 0; opacity: 0; transition: opacity 0.1s;
  }
  .drop-line.active { opacity: 1; }

  /* Block content editors */
  .block-editor { width: 100%; outline: none; }
  .text-editor {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.7;
    resize: none; min-height: 60px;
  }
  .header-wrap { display: flex; gap: 10px; align-items: flex-start; }
  .header-editor {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font); font-weight: 700;
    line-height: 1.3;
  }
  .h1 { font-size: 32px; }
  .h2 { font-size: 24px; }
  .h3 { font-size: 19px; }
  .header-level-select {
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px; font-size: 11px;
    color: var(--text-dim); font-family: var(--mono);
    outline: none; flex-shrink: 0; margin-top: 6px;
  }
  .header-level-select:focus { border-color: rgba(230,255,0,0.3); }
  .image-block { display: flex; flex-direction: column; gap: 10px; }
  .url-input {
    width: 100%; background: var(--bg4); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-family: var(--mono); font-size: 12px; color: var(--text);
    outline: none; transition: border-color var(--transition);
  }
  .url-input:focus { border-color: rgba(230,255,0,0.3); }
  .url-input::placeholder { color: var(--text-muted); }
  .image-preview {
    border-radius: var(--radius-sm); overflow: hidden;
    border: 1px solid var(--border); background: var(--bg4);
    max-height: 280px; display: flex; align-items: center; justify-content: center;
    min-height: 100px;
  }
  .image-preview img { max-width: 100%; max-height: 280px; object-fit: contain; display: block; }
  .image-placeholder {
    color: var(--text-muted); font-size: 12px; padding: 30px;
    text-align: center; display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .btn-block-preview {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--neon); color: #000; border: none;
    border-radius: var(--radius-sm); padding: 10px 20px;
    font-family: var(--font); font-size: 14px; font-weight: 700;
    box-shadow: 0 0 20px rgba(230,255,0,0.25);
  }
  .btn-label-input {
    background: transparent; border: none; outline: none;
    font-family: var(--font); font-size: 14px; font-weight: 700;
    color: #000; text-align: center; width: 100%;
  }
  .markdown-block { display: flex; flex-direction: column; gap: 10px; }
  .markdown-input {
    width: 100%; background: var(--bg4); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    font-family: var(--mono); font-size: 12px; color: var(--text);
    outline: none; resize: vertical; min-height: 80px; line-height: 1.6;
  }
  .markdown-input:focus { border-color: rgba(230,255,0,0.3); }
  .markdown-preview {
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    font-size: 14px; line-height: 1.75; color: var(--text);
  }
  .markdown-preview h1, .markdown-preview h2, .markdown-preview h3 { color: var(--neon); margin-bottom: 8px; font-weight: 700; }
  .markdown-preview h1 { font-size: 22px; }
  .markdown-preview h2 { font-size: 18px; }
  .markdown-preview h3 { font-size: 15px; }
  .markdown-preview p { margin-bottom: 10px; }
  .markdown-preview code { font-family: var(--mono); background: var(--bg3); padding: 2px 5px; border-radius: 4px; font-size: 12px; color: var(--neon); }
  .markdown-preview pre { background: var(--bg3); padding: 12px; border-radius: 8px; overflow-x: auto; margin-bottom: 10px; }
  .markdown-preview pre code { background: none; padding: 0; color: var(--text); }
  .markdown-preview ul, .markdown-preview ol { padding-left: 20px; margin-bottom: 10px; }
  .markdown-preview a { color: var(--neon); }
  .markdown-preview strong { color: #fff; }
  .markdown-tabs {
    display: flex; gap: 2px; background: var(--bg4);
    border-radius: 6px; padding: 3px; width: fit-content;
    border: 1px solid var(--border);
  }
  .md-tab {
    padding: 4px 10px; border-radius: 4px; font-size: 11px;
    color: var(--text-muted); transition: all 0.15s; font-family: var(--mono);
  }
  .md-tab.active { background: var(--neon); color: #000; font-weight: 700; }

  /* Block type badge */
  .block-type-badge {
    position: absolute; top: 14px; right: 14px;
    font-size: 10px; font-family: var(--mono); letter-spacing: 0.08em;
    color: var(--text-muted); background: var(--bg4);
    padding: 3px 7px; border-radius: 4px; border: 1px solid var(--border);
  }

  /* Drag ghost */
  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 9999;
    background: var(--bg3); border: 1px solid rgba(230,255,0,0.4);
    border-radius: var(--radius); padding: 12px 16px;
    min-width: 200px; box-shadow: var(--neon-glow), 0 20px 60px rgba(0,0,0,0.8);
    opacity: 0.9; transform: rotate(1deg) scale(1.02);
  }

  /* Right panel */
  .right-panel {
    width: 220px; background: var(--bg2); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .panel-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 12px; }
  .stat-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 11px; color: var(--text-muted); }
  .stat-value { font-size: 12px; font-family: var(--mono); color: var(--neon); }
  .page-title-input {
    width: 100%; background: var(--bg4); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 10px;
    font-family: var(--font); font-size: 12px; color: var(--text);
    outline: none; margin-top: 10px;
  }
  .page-title-input:focus { border-color: rgba(230,255,0,0.3); }
  .clear-btn {
    width: 100%; margin-top: 12px; padding: 8px; border-radius: var(--radius-sm);
    background: rgba(255,85,85,0.08); border: 1px solid rgba(255,85,85,0.2);
    color: rgba(255,85,85,0.7); font-size: 11px; font-family: var(--font);
    letter-spacing: 0.04em; transition: all 0.15s; font-weight: 600;
  }
  .clear-btn:hover { background: rgba(255,85,85,0.15); color: #ff5555; border-color: rgba(255,85,85,0.4); }

  /* Notification toast */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9990; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 16px;
    font-size: 12px; color: var(--text-dim);
    animation: toastIn 0.2s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.success { border-color: rgba(230,255,0,0.3); color: var(--neon); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

  /* Divider block */
  .divider-block { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  /* Responsive */
  @media (max-width: 900px) {
    .right-panel { display: none; }
  }
  @media (max-width: 640px) {
    .sidebar { width: 200px; }
    .canvas-area { padding: 16px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ============ BLOCK DEFINITIONS ============
const BLOCK_TYPES = [
  { type: 'header', name: 'Heading', desc: 'H1, H2, or H3', icon: '𝐇', color: '#E6FF00' },
  { type: 'text', name: 'Text', desc: 'Paragraph text', icon: '¶', color: '#a0a0ff' },
  { type: 'image', name: 'Image', desc: 'URL preview', icon: '⬛', color: '#ff9f7f' },
  { type: 'button', name: 'Button', desc: 'CTA button', icon: '▶', color: '#7fffb0' },
  { type: 'markdown', name: 'Markdown', desc: 'Live preview', icon: '✦', color: '#ffcf7f' },
  { type: 'divider', name: 'Divider', desc: 'Visual separator', icon: '—', color: '#a0a0a0' },
];

const createBlock = (type) => ({
  id: `block_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
  type,
  content: getDefaultContent(type),
});

function getDefaultContent(type) {
  switch (type) {
    case 'header': return { text: 'Your Heading Here', level: 'h1' };
    case 'text': return { text: 'Start typing your content here. Click to edit this text block and express your ideas.' };
    case 'image': return { url: '', alt: 'Image description' };
    case 'button': return { label: 'Click Me', url: '#' };
    case 'markdown': return { source: '## Hello Markdown\n\nWrite **bold**, *italic*, `code`.\n\n- Item one\n- Item two', tab: 'edit' };
    case 'divider': return {};
    default: return {};
  }
}

// ============ STORAGE ============
const STORAGE_KEY = 'forge_page_builder_v2';
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ============ CUSTOM CURSOR ============
function useCursor() {
  useEffect(() => {
    const ring = document.getElementById('cursor-ring');
    const dot = document.getElementById('cursor-dot');
    let mx = 0, my = 0, rx = 0, ry = 0;
    let raf;
    const onMove = (e) => { mx = e.clientX; my = e.clientY; };
    const onDown = () => ring.classList.add('clicking');
    const onUp = () => ring.classList.remove('clicking');
    const tick = () => {
      rx += (mx - rx) * 0.14;
      ry += (my - ry) * 0.14;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      dot.style.left = mx + 'px'; dot.style.top = my + 'px';
      raf = requestAnimationFrame(tick);
    };
    const onOver = (e) => {
      const t = e.target;
      if (t.closest('button, input, textarea, select, [role=button], .block-card, .canvas-block')) ring.classList.add('hovering');
      else ring.classList.remove('hovering');
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mousemove', onOver);
    document.addEventListener('mousedown', onDown);
    document.addEventListener('mouseup', onUp);
    raf = requestAnimationFrame(tick);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mousemove', onOver);
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('mouseup', onUp);
      cancelAnimationFrame(raf);
    };
  }, []);
}

// ============ TOAST ============
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'default') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2200);
  }, []);
  return [toasts, add];
}

// ============ BLOCK EDITORS ============
function TextEditor({ content, onChange }) {
  const ref = useRef();
  const onInput = () => onChange({ text: ref.current.value });
  useEffect(() => { if (ref.current) ref.current.style.height = 'auto', ref.current.style.height = ref.current.scrollHeight + 'px'; }, [content.text]);
  return <textarea ref={ref} className="text-editor" value={content.text} onChange={e => onChange({ text: e.target.value })} placeholder="Type your content..." rows={3} />;
}

function HeaderEditor({ content, onChange }) {
  return (
    <div className="header-wrap">
      <input
        className={`header-editor ${content.level}`}
        value={content.text}
        onChange={e => onChange({ ...content, text: e.target.value })}
        placeholder="Your heading..."
      />
      <select className="header-level-select" value={content.level} onChange={e => onChange({ ...content, level: e.target.value })}>
        <option value="h1">H1</option>
        <option value="h2">H2</option>
        <option value="h3">H3</option>
      </select>
    </div>
  );
}

function ImageEditor({ content, onChange }) {
  const [err, setErr] = useState(false);
  return (
    <div className="image-block">
      <input className="url-input" value={content.url} onChange={e => { setErr(false); onChange({ ...content, url: e.target.value }); }} placeholder="https://example.com/image.png" />
      <div className="image-preview">
        {content.url ? (
          err ? (
            <div className="image-placeholder">⚠ Could not load image<br/><span style={{fontSize:10,color:'var(--text-muted)'}}>Check the URL</span></div>
          ) : (
            <img src={content.url} alt={content.alt} onError={() => setErr(true)} />
          )
        ) : (
          <div className="image-placeholder">
            <span style={{fontSize:28}}>🖼</span>
            <span>Paste an image URL above</span>
          </div>
        )}
      </div>
    </div>
  );
}

function ButtonEditor({ content, onChange }) {
  return (
    <div style={{display:'flex', flexDirection:'column', gap:8, alignItems:'flex-start'}}>
      <div className="btn-block-preview">
        <input className="btn-label-input" value={content.label} onChange={e => onChange({ ...content, label: e.target.value })} placeholder="Button label" />
      </div>
      <input className="url-input" value={content.url} onChange={e => onChange({ ...content, url: e.target.value })} placeholder="https://..." style={{width:'100%', maxWidth:320}} />
    </div>
  );
}

function MarkdownEditor({ content, onChange }) {
  const tab = content.tab || 'edit';
  const rendered = useMemo(() => {
    try { return marked.parse(content.source || ''); } catch { return ''; }
  }, [content.source]);
  return (
    <div className="markdown-block">
      <div className="markdown-tabs">
        <div className={`md-tab ${tab === 'edit' ? 'active' : ''}`} onClick={() => onChange({ ...content, tab: 'edit' })}>Edit</div>
        <div className={`md-tab ${tab === 'preview' ? 'active' : ''}`} onClick={() => onChange({ ...content, tab: 'preview' })}>Preview</div>
      </div>
      {tab === 'edit'
        ? <textarea className="markdown-input" value={content.source} onChange={e => onChange({ ...content, source: e.target.value })} placeholder="Write markdown here..." />
        : <div className="markdown-preview" dangerouslySetInnerHTML={{ __html: rendered }} />}
    </div>
  );
}

function BlockContent({ block, onChange }) {
  switch (block.type) {
    case 'text': return <TextEditor content={block.content} onChange={onChange} />;
    case 'header': return <HeaderEditor content={block.content} onChange={onChange} />;
    case 'image': return <ImageEditor content={block.content} onChange={onChange} />;
    case 'button': return <ButtonEditor content={block.content} onChange={onChange} />;
    case 'markdown': return <MarkdownEditor content={block.content} onChange={onChange} />;
    case 'divider': return <hr className="divider-block" />;
    default: return null;
  }
}

// ============ CANVAS BLOCK ============
function CanvasBlock({ block, onUpdate, onDelete, onDuplicate, onDragStart, onDragEnd, onDragOver, onDrop, isDragging, dragOverId }) {
  const [removing, setRemoving] = useState(false);
  const handleDelete = () => {
    setRemoving(true);
    setTimeout(() => onDelete(block.id), 160);
  };
  const typeInfo = BLOCK_TYPES.find(b => b.type === block.type);
  return (
    <div className={`canvas-block-wrap${removing ? ' removing' : ''}`}
      draggable
      onDragStart={e => { e.dataTransfer.effectAllowed = 'move'; onDragStart(block.id, 'canvas'); }}
      onDragEnd={onDragEnd}
      onDragOver={e => { e.preventDefault(); onDragOver(block.id); }}
      onDrop={e => { e.preventDefault(); onDrop(block.id); }}
    >
      <div className={`block-toolbar`}>
        <div className="tb-drag-handle" title="Drag to reorder">⠿</div>
        <button className="tb-btn" onClick={() => onDuplicate(block.id)}>⧉ Duplicate</button>
        <button className="tb-btn danger" onClick={handleDelete}>✕ Delete</button>
      </div>
      <div className={`canvas-block${dragOverId === block.id ? ' drag-over-block' : ''}`}>
        <span className="block-type-badge">{typeInfo?.name}</span>
        <BlockContent block={block} onChange={c => onUpdate(block.id, c)} />
      </div>
    </div>
  );
}

// ============ MAIN APP ============
function App() {
  useCursor();
  const [toasts, addToast] = useToasts();

  const defaultState = { blocks: [], pageTitle: 'Untitled Page', history: [[]], historyIdx: 0 };
  const savedRaw = loadState();

  const [blocks, setBlocksRaw] = useState(() => savedRaw?.blocks || []);
  const [pageTitle, setPageTitle] = useState(() => savedRaw?.pageTitle || 'Untitled Page');
  const [history, setHistory] = useState(() => savedRaw ? [savedRaw.blocks] : [[]]);
  const [historyIdx, setHistoryIdx] = useState(0);
  const [sidebarSearch, setSidebarSearch] = useState('');
  const [dragging, setDragging] = useState(null); // { id, source }
  const [dragOverId, setDragOverId] = useState(null);
  const [canvasDragOver, setCanvasDragOver] = useState(false);
  const canvasRef = useRef();

  // Persist
  useEffect(() => {
    saveState({ blocks, pageTitle });
  }, [blocks, pageTitle]);

  const pushHistory = useCallback((newBlocks) => {
    setHistory(prev => {
      const slice = prev.slice(0, historyIdx + 1);
      return [...slice, newBlocks];
    });
    setHistoryIdx(prev => prev + 1);
  }, [historyIdx]);

  const setBlocks = useCallback((newBlocks) => {
    setBlocksRaw(newBlocks);
    pushHistory(newBlocks);
  }, [pushHistory]);

  const undo = useCallback(() => {
    if (historyIdx > 0) {
      const ni = historyIdx - 1;
      setHistoryIdx(ni);
      setBlocksRaw(history[ni]);
    }
  }, [historyIdx, history]);

  const redo = useCallback(() => {
    if (historyIdx < history.length - 1) {
      const ni = historyIdx + 1;
      setHistoryIdx(ni);
      setBlocksRaw(history[ni]);
    }
  }, [historyIdx, history]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [undo, redo]);

  const addBlock = (type) => {
    const b = createBlock(type);
    const nb = [...blocks, b];
    setBlocks(nb);
    addToast(`${BLOCK_TYPES.find(t => t.type === type)?.name} added`, 'success');
    setTimeout(() => {
      canvasRef.current?.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  };

  const updateBlock = (id, content) => {
    const nb = blocks.map(b => b.id === id ? { ...b, content } : b);
    setBlocksRaw(nb);
    saveState({ blocks: nb, pageTitle });
  };

  const deleteBlock = (id) => {
    const nb = blocks.filter(b => b.id !== id);
    setBlocks(nb);
    addToast('Block deleted');
  };

  const duplicateBlock = (id) => {
    const idx = blocks.findIndex(b => b.id === id);
    const orig = blocks[idx];
    const clone = { ...orig, id: `block_${Date.now()}_${Math.random().toString(36).slice(2,7)}`, content: JSON.parse(JSON.stringify(orig.content)) };
    const nb = [...blocks.slice(0, idx + 1), clone, ...blocks.slice(idx + 1)];
    setBlocks(nb);
    addToast('Block duplicated', 'success');
  };

  const onDragStart = (id, source) => setDragging({ id, source });
  const onDragEnd = () => { setDragging(null); setDragOverId(null); setCanvasDragOver(false); };
  const onDragOver = (id) => setDragOverId(id);

  const onDrop = (targetId) => {
    if (!dragging) return;
    if (dragging.source === 'sidebar') {
      const b = createBlock(dragging.id);
      const tIdx = blocks.findIndex(b => b.id === targetId);
      const nb = [...blocks.slice(0, tIdx + 1), b, ...blocks.slice(tIdx + 1)];
      setBlocks(nb);
      addToast(`${BLOCK_TYPES.find(t => t.type === dragging.id)?.name} added`, 'success');
    } else {
      const fromIdx = blocks.findIndex(b => b.id === dragging.id);
      const toIdx = blocks.findIndex(b => b.id === targetId);
      if (fromIdx === toIdx) return;
      const nb = [...blocks];
      const [moved] = nb.splice(fromIdx, 1);
      nb.splice(toIdx, 0, moved);
      setBlocks(nb);
    }
    setDragging(null); setDragOverId(null);
  };

  const onCanvasDrop = (e) => {
    e.preventDefault();
    if (!dragging) return;
    if (dragging.source === 'sidebar') {
      const b = createBlock(dragging.id);
      const nb = [...blocks, b];
      setBlocks(nb);
      addToast(`${BLOCK_TYPES.find(t => t.type === dragging.id)?.name} added`, 'success');
    }
    setDragging(null); setCanvasDragOver(false); setDragOverId(null);
  };

  const clearAll = () => {
    if (confirm('Clear all blocks?')) { setBlocks([]); addToast('Canvas cleared'); }
  };

  const exportJSON = () => {
    const data = JSON.stringify({ pageTitle, blocks }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `${pageTitle.replace(/\s+/g,'-').toLowerCase()}.json`; a.click();
    URL.revokeObjectURL(url);
    addToast('Exported as JSON', 'success');
  };

  const filteredTypes = BLOCK_TYPES.filter(b => b.name.toLowerCase().includes(sidebarSearch.toLowerCase()) || b.desc.toLowerCase().includes(sidebarSearch.toLowerCase()));

  return (
    <div id="root-inner" style={{height:'100%', display:'flex', flexDirection:'column'}}>
      {/* Topbar */}
      <div className="topbar">
        <div className="logo">
          <div className="logo-mark">
            <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" fill="#000"/><rect x="9" y="2" width="5" height="5" fill="#000"/><rect x="2" y="9" width="5" height="5" fill="#000"/><rect x="9" y="9" width="5" height="5" fill="#000"/></svg>
          </div>
          <span className="logo-text">FOR<span>GE</span></span>
        </div>
        <div className="topbar-badge">PAGE BUILDER</div>
        <div className="topbar-sep" />
        <div className="undo-redo">
          <button className="icon-btn" onClick={undo} disabled={historyIdx === 0} title="Undo (Ctrl+Z)">↩</button>
          <button className="icon-btn" onClick={redo} disabled={historyIdx >= history.length - 1} title="Redo (Ctrl+Y)">↪</button>
        </div>
        <button className="btn-primary" onClick={exportJSON}>⬇ Export</button>
      </div>

      <div className="workspace">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-header">
            <div className="sidebar-label">Blocks</div>
            <input className="sidebar-search" placeholder="Search blocks..." value={sidebarSearch} onChange={e => setSidebarSearch(e.target.value)} />
          </div>
          <div className="sidebar-blocks">
            {filteredTypes.map(bt => (
              <div
                key={bt.type}
                className={`block-card${dragging?.id === bt.type ? ' dragging-source' : ''}`}
                draggable
                onDragStart={e => { e.dataTransfer.effectAllowed = 'copy'; onDragStart(bt.type, 'sidebar'); }}
                onDragEnd={onDragEnd}
                onClick={() => addBlock(bt.type)}
              >
                <div className="block-icon" style={{color: bt.color}}>{bt.icon}</div>
                <div className="block-info">
                  <div className="block-name">{bt.name}</div>
                  <div className="block-desc">{bt.desc}</div>
                </div>
                <div className="drag-handle">⠿</div>
              </div>
            ))}
          </div>
        </div>

        {/* Canvas */}
        <div className="canvas-area"
          onDragOver={e => { e.preventDefault(); setCanvasDragOver(true); }}
          onDragLeave={() => setCanvasDragOver(false)}
          onDrop={onCanvasDrop}
        >
          <div className="canvas-drop-zone" ref={canvasRef}>
            {blocks.length === 0 ? (
              <div className={`empty-state${canvasDragOver ? ' drag-over' : ''}`}>
                <div className="empty-icon">✦</div>
                <div className="empty-title">Start building your page</div>
                <div className="empty-sub">Drag blocks from the left panel, or click them to add to your canvas.</div>
                <div className="empty-hint">↖ DRAG FROM SIDEBAR OR CLICK TO ADD</div>
              </div>
            ) : (
              blocks.map((block, i) => (
                <CanvasBlock
                  key={block.id}
                  block={block}
                  onUpdate={updateBlock}
                  onDelete={deleteBlock}
                  onDuplicate={duplicateBlock}
                  onDragStart={onDragStart}
                  onDragEnd={onDragEnd}
                  onDragOver={onDragOver}
                  onDrop={onDrop}
                  isDragging={dragging?.id === block.id}
                  dragOverId={dragOverId}
                />
              ))
            )}
          </div>
        </div>

        {/* Right panel */}
        <div className="right-panel">
          <div className="panel-header">Page Settings</div>
          <div className="panel-body">
            <div className="stat-label" style={{marginBottom:4}}>Page Title</div>
            <input className="page-title-input" value={pageTitle} onChange={e => setPageTitle(e.target.value)} placeholder="Untitled Page" />
            <div style={{marginTop:16}}>
              {[
                { label: 'Blocks', value: blocks.length },
                { label: 'History', value: `${historyIdx + 1} / ${history.length}` },
                { label: 'Saved', value: '✓ Auto' },
              ].map(s => (
                <div className="stat-row" key={s.label}>
                  <span className="stat-label">{s.label}</span>
                  <span className="stat-value">{s.value}</span>
                </div>
              ))}
            </div>
            <button className="clear-btn" onClick={clearAll}>✕ Clear All Blocks</button>
          </div>
        </div>
      </div>

      {/* Toasts */}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>{t.type === 'success' ? '✓' : '•'} {t.msg}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
